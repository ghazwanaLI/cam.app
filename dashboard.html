<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>لوحة التحكم — كاميرات المراقبة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Tahoma,'Segoe UI',Arial,sans-serif;background:#0a0f1e;color:#e2e8f0;direction:rtl;min-height:100vh;padding-bottom:74px;font-size:14px}

/* HEADER */
.header{background:linear-gradient(135deg,#0d1530,#0f1e3a);border-bottom:1px solid #1e3a5f;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hlogo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#1a6ef5,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 14px rgba(26,110,245,.4)}
.htitle{font-size:14px;font-weight:800;color:#f1f5f9}
.hsub{font-size:10px;color:#64748b;margin-top:2px}
.hout{margin-right:auto;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#0d1530;border-top:1px solid #1e3a5f;display:flex;z-index:100}
.nb{flex:1;padding:10px 2px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;font-family:inherit;font-size:10px;color:#64748b}
.nb.on{color:#60a5fa}
.ni{font-size:20px;line-height:1}

/* PAGES */
.pg{display:none;padding:14px}
.pg.on{display:block}

/* CARD */
.card{background:#0d1530;border:1px solid #1e3a5f;border-radius:14px;padding:14px;margin-bottom:10px}
.card-red{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3)}
.card-yellow{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.3)}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:#0d1530;border:1px solid #1e3a5f;border-radius:14px;padding:14px;cursor:pointer}
.si{font-size:24px;margin-bottom:6px}
.sv{font-size:30px;font-weight:900}
.sl{font-size:12px;color:#64748b;margin-top:4px}
.bl{color:#60a5fa}.gn{color:#34d399}.or{color:#fbbf24}.rd{color:#f87171}

/* SECTION TITLE */
.st{font-size:14px;font-weight:700;margin:14px 0 10px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* BADGE */
.b{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bb{background:rgba(26,110,245,.15);color:#60a5fa;border:1px solid rgba(26,110,245,.3)}
.bg{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.bo{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.br{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.bx{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}
.bp{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)}

/* ROW */
.rw{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid #1e3a5f}
.chip.on{background:rgba(26,110,245,.2);color:#60a5fa;border-color:rgba(26,110,245,.4)}

/* FORM */
.fg{margin-bottom:12px}
.fl{font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:5px}
.fi,.fs,.ft{width:100%;background:#0a0f1e;border:1px solid #1e3a5f;color:#e2e8f0;padding:11px 12px;border-radius:10px;font-size:14px;font-family:inherit;direction:rtl;outline:none}
.fi:focus,.fs:focus,.ft:focus{border-color:#1a6ef5}
.ft{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btp{flex:1;background:linear-gradient(135deg,#1a6ef5,#0ea5e9);color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btg{background:#1e3a5f;color:#94a3b8;border:none;padding:13px 18px;border-radius:12px;font-size:15px;cursor:pointer;font-family:inherit}
.bts{padding:8px 14px;border-radius:10px;font-size:13px;border:none;cursor:pointer;font-family:inherit;font-weight:700;background:linear-gradient(135deg,#1a6ef5,#0ea5e9);color:#fff}
.btd{background:none;border:none;color:#f87171;font-size:12px;cursor:pointer;font-family:inherit;padding:4px 8px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end}
.mo.on{display:flex}
.md{background:#0d1530;border-radius:20px 20px 0 0;border:1px solid #1e3a5f;width:100%;max-height:90vh;overflow-y:auto;padding:18px 16px 36px}
.mh{width:40px;height:4px;background:#1e3a5f;border-radius:99px;margin:0 auto 14px}
.mt{font-size:16px;font-weight:800;margin-bottom:16px}

/* EMPTY */
.em{text-align:center;padding:38px 20px;color:#475569}
.ei{font-size:44px;margin-bottom:10px}

/* BAR */
.barw{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(30,58,95,.4)}
.barw:last-child{border-bottom:none}
.barbg{flex:2;height:6px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.barfi{height:100%;border-radius:99px;background:linear-gradient(90deg,#1a6ef5,#0ea5e9)}

/* TOAST */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:#1a6ef5;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:700;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none;pointer-events:none}

/* IMG */
.img-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.img-wr{position:relative}
.img-th{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #1e3a5f}
.img-dl{position:absolute;top:-6px;left:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer}

/* WARN BOX */
.warn-box{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:9px 12px;margin-bottom:14px;font-size:12px;color:#fbbf24}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="hlogo">📹</div>
  <div>
    <div class="htitle">كاميرات المراقبة</div>
    <div class="hsub" id="h-sub">...</div>
  </div>
  <button class="hout" onclick="logout()">خروج</button>
</div>

<!-- ═══ PAGES ═══ -->

<!-- HOME -->
<div class="pg on" id="p-home">
  <div class="sg" id="home-stats"></div>
  <div id="home-alerts"></div>
  <div class="st"><div class="dot" style="background:#fbbf24;box-shadow:0 0 8px #fbbf24"></div>آخر الجولات</div>
  <div id="home-tours"></div>
</div>

<!-- TOURS -->
<div class="pg" id="p-tours">
  <div class="rw"><div style="font-weight:800;font-size:16px">الجولات الميدانية</div><button class="bts" onclick="openM('m-tour')">＋ جولة</button></div>
  <div id="tour-alert-box"></div>
  <div class="chips" id="tour-chips"></div>
  <div id="tours-list"></div>
</div>

<!-- MAINTENANCE -->
<div class="pg" id="p-maint">
  <div class="rw"><div style="font-weight:800;font-size:16px">الصيانة والأجهزة</div><button class="bts" onclick="openM('m-maint')">＋ إضافة</button></div>
  <div id="maint-sum"></div>
  <div class="chips" id="maint-chips"></div>
  <div id="maint-list"></div>
</div>

<!-- STATIONS -->
<div class="pg" id="p-stations">
  <div style="font-weight:800;font-size:16px;margin-bottom:12px">المحطات</div>
  <div class="chips" id="station-chips"></div>
  <div id="stations-list"></div>
</div>

<!-- REPORTS -->
<div class="pg" id="p-reports">
  <div style="font-weight:800;font-size:16px;margin-bottom:12px">التقارير</div>
  <div style="display:flex;gap:10px;margin-bottom:14px">
    <input type="month" id="rp-month" class="fi" style="flex:1" oninput="loadReports()">
    <select id="rp-dist" class="fs" style="flex:1" oninput="loadReports()">
      <option value="">كل القواطع</option>
    </select>
  </div>
  <div class="chips" id="rp-tabs">
    <span class="chip on" data-t="sum" onclick="rpTab(this)">الملخص</span>
    <span class="chip" data-t="dist" onclick="rpTab(this)">القواطع</span>
    <span class="chip" data-t="dev" onclick="rpTab(this)">الأجهزة</span>
  </div>
  <div id="rp-body"></div>
</div>

<!-- OFFICERS (admin) -->
<div class="pg" id="p-officers">
  <div class="rw"><div style="font-weight:800;font-size:16px">المخولون</div><button class="bts" onclick="openM('m-officer')">＋ إضافة</button></div>
  <div id="officers-list"></div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="nav" id="bot-nav"></nav>

<!-- ═══ MODALS ═══ -->

<!-- TOUR -->
<div class="mo" id="m-tour" onclick="cmoOut(event,'m-tour')">
  <div class="md">
    <div class="mh"></div>
    <div class="mt">🚗 تسجيل جولة ميدانية</div>
    <div class="fg"><label class="fl">القاطع</label><select class="fs" id="t-d" onchange="fillSt('t-d','t-s')"></select></div>
    <div class="fg"><label class="fl">المحطة</label><select class="fs" id="t-s"></select></div>
    <div class="fg"><label class="fl">نوع الزيارة</label>
      <select class="fs" id="t-v"><option>كشف دوري</option><option>صيانة</option><option>تركيب</option><option>متابعة</option></select>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">التاريخ</label><input class="fi" type="date" id="t-dt"></div>
      <div class="fg"><label class="fl">الوقت</label><input class="fi" type="time" id="t-tm"></div>
    </div>
    <div class="fg"><label class="fl">ملاحظات</label><textarea class="ft" id="t-no" placeholder="ما الذي لاحظته..."></textarea></div>
    <div class="fg">
      <label class="fl">رفع صور</label>
      <input class="fi" type="file" accept="image/*" multiple onchange="addImgs(event)" style="padding:8px;cursor:pointer">
      <div class="img-grid" id="t-imgs"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btg" onclick="cmo('m-tour')">إلغاء</button>
      <button class="btp" onclick="saveTour()">💾 حفظ الجولة</button>
    </div>
  </div>
</div>

<!-- MAINT -->
<div class="mo" id="m-maint" onclick="cmoOut(event,'m-maint')">
  <div class="md">
    <div class="mh"></div>
    <div class="mt">🔧 صيانة / صرف جهاز</div>
    <div class="warn-box">⚠️ خاص بالمحطات الحكومية فقط</div>
    <div class="fg"><label class="fl">القاطع</label><select class="fs" id="m-d" onchange="fillSt('m-d','m-s')"></select></div>
    <div class="fg"><label class="fl">المحطة</label><select class="fs" id="m-s"></select></div>
    <div class="fr">
      <div class="fg">
        <label class="fl">نوع الجهاز</label>
        <select class="fs" id="m-dev">
          <option>كاميرا مراقبة</option><option>مسجل DVR/NVR</option><option>كابلات وأسلاك</option>
          <option>طاقة شمسية</option><option>لوحة تحكم</option><option>حامل كاميرا</option>
          <option>وحدة تغذية UPS</option><option>أخرى</option>
        </select>
      </div>
      <div class="fg"><label class="fl">الكمية</label><input class="fi" type="number" id="m-qty" value="1" min="1"></div>
    </div>
    <div class="fg"><label class="fl">سبب الصيانة</label><input class="fi" id="m-rsn" placeholder="عطل، احتراق..."></div>
    <div class="fg"><label class="fl">اسم الفني</label><input class="fi" id="m-tch" placeholder="اسم الفني المنفذ..."></div>
    <div class="fr">
      <div class="fg"><label class="fl">التاريخ</label><input class="fi" type="date" id="m-dt"></div>
      <div class="fg"><label class="fl">الحالة</label>
        <select class="fs" id="m-st"><option>مكتمل</option><option>جاري</option><option>معلق</option><option>يحتاج قطعة</option></select>
      </div>
    </div>
    <div class="fg"><label class="fl">ملاحظات</label><textarea class="ft" id="m-no" placeholder="تفاصيل العمل..."></textarea></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btg" onclick="cmo('m-maint')">إلغاء</button>
      <button class="btp" onclick="saveMaint()">💾 حفظ السجل</button>
    </div>
  </div>
</div>

<!-- OFFICER -->
<div class="mo" id="m-officer" onclick="cmoOut(event,'m-officer')">
  <div class="md">
    <div class="mh"></div>
    <div class="mt">➕ إضافة مخول جديد</div>
    <div class="fg"><label class="fl">القاطع</label><select class="fs" id="o-d"></select></div>
    <div class="fg"><label class="fl">الاسم الكامل</label><input class="fi" id="o-n" placeholder="اسم المخول..."></div>
    <div class="fg"><label class="fl">رقم الهاتف</label><input class="fi" id="o-p" placeholder="07xxxxxxxxx"></div>
    <div class="fg"><label class="fl">كلمة المرور</label><input class="fi" type="password" id="o-w" placeholder="كلمة مرور..."></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btg" onclick="cmo('m-officer')">إلغاء</button>
      <button class="btp" onclick="saveOfficer()">💾 حفظ</button>
    </div>
  </div>
</div>

<!-- STATION DETAIL -->
<div class="mo" id="m-station" onclick="cmoOut(event,'m-station')">
  <div class="md">
    <div class="mh"></div>
    <div id="m-station-body"></div>
    <button class="btg" style="width:100%;margin-top:16px" onclick="cmo('m-station')">إغلاق</button>
  </div>
</div>

<!-- TOUR DETAIL -->
<div class="mo" id="m-tourdet" onclick="cmoOut(event,'m-tourdet')">
  <div class="md">
    <div class="mh"></div>
    <div id="m-tourdet-body"></div>
    <button class="btg" style="width:100%;margin-top:16px" onclick="cmo('m-tourdet')">إغلاق</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
// STATE
// ══════════════════════════════
let U=null, districts=[], stations=[], tours=[], maintenance=[], officers=[];
let pendImgs=[], curPage="home", rpTabVal="sum", rpData=null;
const ALERT=14;
const fd=d=>{try{return new Date(d).toLocaleDateString("ar-IQ",{year:"numeric",month:"short",day:"numeric"});}catch{return d;}};
const ds=d=>{try{return Math.floor((Date.now()-new Date(d))/86400000);}catch{return 999;}};
const api=async(u,m="GET",b=null)=>{const r=await fetch(u,{method:m,headers:{"Content-Type":"application/json"},body:b?JSON.stringify(b):null});const d=await r.json();if(!r.ok)throw new Error(d.error||"خطأ");return d;};

// ══════════════════════════════
// INIT
// ══════════════════════════════
async function init(){
  try{ U=await api("/api/me"); }catch{ location.href="/"; return; }
  document.getElementById("h-sub").textContent = U.role==="admin" ? "مشرف عام — كل القواطع" : `قاطع ${U.district}`;
  [districts,stations]=await Promise.all([api("/api/districts"),api("/api/stations")]);
  buildNav(); fillAllSelects();
  document.getElementById("rp-month").value=new Date().toISOString().slice(0,7);
  if(U.role==="admin"){
    const s=document.getElementById("rp-dist");
    districts.forEach(d=>{const o=document.createElement("option");o.value=d.id;o.textContent=d.name;s.appendChild(o);});
  } else { document.getElementById("rp-dist").style.display="none"; }
  await loadAll();
  showPg("home");
}

async function loadAll(){
  const p=[api("/api/tours"),api("/api/maintenance")];
  if(U.role==="admin") p.push(api("/api/officers"));
  const r=await Promise.all(p);
  tours=r[0]; maintenance=r[1];
  if(U.role==="admin") officers=r[2];
  renderAll();
}

// ══════════════════════════════
// NAV
// ══════════════════════════════
function buildNav(){
  const items=[
    {id:"home",ic:"🏠",lb:"الرئيسية"},
    {id:"tours",ic:"🚗",lb:"الجولات"},
    {id:"maint",ic:"🔧",lb:"الصيانة"},
    {id:"stations",ic:"🏛️",lb:"المحطات"},
    {id:"reports",ic:"📊",lb:"التقارير"},
    ...(U.role==="admin"?[{id:"officers",ic:"👥",lb:"المخولون"}]:[]),
  ];
  document.getElementById("bot-nav").innerHTML=items.map(n=>
    `<button class="nb" id="nb-${n.id}" onclick="showPg('${n.id}')"><span class="ni">${n.ic}</span>${n.lb}</button>`
  ).join("");
}

function showPg(id){
  document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));
  document.getElementById("p-"+id)?.classList.add("on");
  document.getElementById("nb-"+id)?.classList.add("on");
  curPage=id;
  if(id==="reports") loadReports();
}

// ══════════════════════════════
// RENDER
// ══════════════════════════════
function renderAll(){ renderHome(); renderTours(); renderMaint(); renderStations(); if(U.role==="admin") renderOfficers(); }

function alertSts(){
  return stations.filter(s=>{
    const l=tours.filter(t=>t.station===s.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    return !l||ds(l.date)>=ALERT;
  });
}

function vbadge(v){
  const m={"كشف دوري":"bb","صيانة":"bo","تركيب":"bp","متابعة":"bx"};
  return `<span class="b ${m[v]||'bx'}">${v}</span>`;
}
function sbadge(s){
  const m={"مكتمل":"bg","جاري":"bo","معلق":"br","يحتاج قطعة":"bo"};
  return `<span class="b ${m[s]||'bx'}">${s}</span>`;
}

// HOME
function renderHome(){
  const pending=maintenance.filter(m=>m.status==="معلق");
  const alerts=alertSts();
  document.getElementById("home-stats").innerHTML=[
    {ic:"🏛️",v:stations.length,lb:"المحطات",c:"bl",pg:"stations"},
    {ic:"🚗",v:tours.length,lb:"الجولات",c:"or",pg:"tours"},
    {ic:"🔧",v:maintenance.length,lb:"الصيانة",c:"gn",pg:"maint"},
    {ic:"⚠️",v:alerts.length,lb:"تحتاج زيارة",c:"rd",pg:"stations"},
  ].map(s=>`<div class="sc" onclick="showPg('${s.pg}')"><div class="si">${s.ic}</div><div class="sv ${s.c}">${s.v}</div><div class="sl">${s.lb}</div></div>`).join("");

  let ah="";
  if(alerts.length) ah+=`<div class="card card-red" style="margin-bottom:10px">
    <div style="font-weight:700;color:#f87171;margin-bottom:8px;font-size:13px">⚠️ محطات لم تُزار منذ ${ALERT}+ يوم (${alerts.length})</div>
    ${alerts.slice(0,4).map(s=>{const l=tours.filter(t=>t.station===s.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];return`<div style="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;padding:3px 0"><span>${s.name}</span><span style="color:#f87171">${l?ds(l.date)+" يوم":"لم تُزار"}</span></div>`;}).join("")}
  </div>`;
  if(pending.length) ah+=`<div class="card card-yellow" style="margin-bottom:10px">
    <div style="font-weight:700;color:#fbbf24;margin-bottom:6px;font-size:13px">🔧 صيانة معلقة (${pending.length})</div>
    ${pending.slice(0,3).map(m=>`<div style="font-size:12px;color:#94a3b8;padding:2px 0">${m.statName} — ${m.deviceType}</div>`).join("")}
  </div>`;
  document.getElementById("home-alerts").innerHTML=ah;

  document.getElementById("home-tours").innerHTML=tours.length===0
    ?`<div class="card" style="text-align:center;color:#64748b;padding:20px">لا توجد جولات بعد</div>`
    :tours.slice(0,4).map(t=>`
      <div class="card" onclick="showTourDet(${t.id})" style="cursor:pointer">
        <div class="rw"><div style="font-weight:700">📍 ${t.statName}</div><span style="font-size:11px;color:#64748b">${fd(t.date)}</span></div>
        <div class="rr" style="margin-top:8px">${vbadge(t.visitType)}<span class="b bb">قاطع ${t.distName}</span><span style="font-size:11px;color:#64748b">👤 ${t.officerName}</span></div>
      </div>`).join("");
}

// TOURS
function renderTours(){
  const alSt=alertSts();
  document.getElementById("tour-alert-box").innerHTML=alSt.length
    ?`<div class="card card-red" style="margin-bottom:10px"><div style="font-weight:700;color:#f87171;font-size:13px;margin-bottom:6px">⚠️ ${alSt.length} محطة تحتاج زيارة</div>${alSt.map(s=>`<div style="font-size:12px;color:#94a3b8;padding:2px 0">${s.name}</div>`).join("")}</div>`:""

  const vtypes=["الكل","كشف دوري","صيانة","تركيب","متابعة"];
  const cf=document.querySelector("#tour-chips .chip.on")?.dataset.v||"الكل";
  document.getElementById("tour-chips").innerHTML=vtypes.map(v=>`<span class="chip${v===cf?" on":""}" data-v="${v}" onclick="setTF(this)">${v}</span>`).join("");

  const fl=cf==="الكل"?tours:tours.filter(t=>t.visitType===cf);
  document.getElementById("tours-list").innerHTML=fl.length===0
    ?`<div class="em"><div class="ei">🚗</div><p>لا توجد جولات</p></div>`
    :fl.map(t=>`
      <div class="card" onclick="showTourDet(${t.id})" style="cursor:pointer">
        <div class="rw"><div style="font-weight:700">📍 ${t.statName}</div><span style="font-size:11px;color:#64748b">${fd(t.date)}</span></div>
        ${t.notes?`<div style="font-size:13px;color:#94a3b8;margin:5px 0">${t.notes}</div>`:""}
        <div class="rr" style="margin-top:8px">
          ${vbadge(t.visitType)}<span class="b bb">قاطع ${t.distName}</span>
          <span style="font-size:11px;color:#64748b">👤 ${t.officerName}</span>
          ${t.images?.length?`<span style="font-size:11px;color:#60a5fa">📷 ${t.images.length}</span>`:""}
          ${U.role==="admin"?`<button class="btd" onclick="event.stopPropagation();delTour(${t.id})">🗑</button>`:""}
        </div>
      </div>`).join("");
}
function setTF(el){document.querySelectorAll("#tour-chips .chip").forEach(c=>c.classList.remove("on"));el.classList.add("on");renderTours();}

// MAINT
function renderMaint(){
  const ds2={};maintenance.forEach(m=>{ds2[m.deviceType]=(ds2[m.deviceType]||0)+(m.qty||1);});
  const maxV=Math.max(...Object.values(ds2),1);
  const tot=Object.values(ds2).reduce((a,v)=>a+v,0);
  document.getElementById("maint-sum").innerHTML=maintenance.length===0?"":
    `<div class="card" style="margin-bottom:10px">
      <div style="font-size:28px;font-weight:900;color:#fbbf24;margin-bottom:10px">${tot} <span style="font-size:13px;color:#64748b">جهاز مجموع</span></div>
      ${Object.entries(ds2).map(([t,c])=>`<div class="barw"><div style="flex:1;font-size:13px">${t}</div><div class="barbg"><div class="barfi" style="width:${Math.round(c/maxV*100)}%"></div></div><div style="font-size:12px;color:#64748b;width:24px">${c}</div></div>`).join("")}
    </div>`;

  const sts=["الكل","مكتمل","جاري","معلق","يحتاج قطعة"];
  const cf=document.querySelector("#maint-chips .chip.on")?.dataset.v||"الكل";
  document.getElementById("maint-chips").innerHTML=sts.map(s=>`<span class="chip${s===cf?" on":""}" data-v="${s}" onclick="setMF(this)">${s}</span>`).join("");

  const fl=cf==="الكل"?maintenance:maintenance.filter(m=>m.status===cf);
  document.getElementById("maint-list").innerHTML=fl.length===0
    ?`<div class="em"><div class="ei">🔧</div><p>لا توجد سجلات</p></div>`
    :fl.map(m=>`
      <div class="card">
        <div class="rw"><div style="font-weight:700">🔧 ${m.statName}</div><span style="font-size:11px;color:#64748b">${fd(m.date)}</span></div>
        <div style="font-size:13px;color:#94a3b8;margin:4px 0 8px">${m.deviceType} × ${m.qty||1} — ${m.reason||"—"}</div>
        ${m.notes?`<div style="font-size:12px;color:#64748b;margin-bottom:8px">${m.notes}</div>`:""}
        <div class="rr">
          ${sbadge(m.status)}<span class="b bb">قاطع ${m.distName}</span>
          <span style="font-size:11px;color:#64748b">👷 ${m.techName||"—"}</span>
          ${U.role==="admin"?`<button class="btd" onclick="delMaint(${m.id})">🗑</button>`:""}
        </div>
      </div>`).join("");
}
function setMF(el){document.querySelectorAll("#maint-chips .chip").forEach(c=>c.classList.remove("on"));el.classList.add("on");renderMaint();}

// STATIONS
function renderStations(){
  const myD=U.role==="admin"?districts:districts.filter(d=>d.id===U.district);
  const cf=document.querySelector("#station-chips .chip.on")?.dataset.v||"";
  document.getElementById("station-chips").innerHTML=[
    `<span class="chip${!cf?" on":""}" data-v="" onclick="setStF(this)">الكل</span>`,
    ...myD.map(d=>`<span class="chip${cf===d.id?" on":""}" data-v="${d.id}" onclick="setStF(this)">${d.name}</span>`)
  ].join("");
  const fl=cf?stations.filter(s=>s.district===cf):stations;
  document.getElementById("stations-list").innerHTML=fl.map(s=>{
    const sT=tours.filter(t=>t.station===s.id),sM=maintenance.filter(m=>m.station===s.id);
    const last=sT.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const d2=last?ds(last.date):999;
    const c=!last?"#f87171":d2>=ALERT?"#fbbf24":"#34d399";
    return `<div class="card" onclick="showStDet('${s.id}')" style="cursor:pointer">
      <div class="rw"><div style="font-weight:700;flex:1">${s.name}</div><span class="b bb">${districts.find(d=>d.id===s.district)?.name||""}</span></div>
      <div class="rr" style="margin-top:8px">
        <div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:${c};box-shadow:0 0 6px ${c}"></div><span style="font-size:12px;color:${c}">${!last?"لم تُزار":d2+" يوم"}</span></div>
        <span style="font-size:12px;color:#64748b">📋 ${sT.length} جولة</span>
        <span style="font-size:12px;color:#64748b">🔧 ${sM.length} صيانة</span>
        ${sM.some(m=>m.status==="معلق")?`<span class="b br">⚠️ معلق</span>`:""}
      </div>
    </div>`;
  }).join("");
}
function setStF(el){document.querySelectorAll("#station-chips .chip").forEach(c=>c.classList.remove("on"));el.classList.add("on");renderStations();}

// OFFICERS
function renderOfficers(){
  document.getElementById("officers-list").innerHTML=officers.length===0
    ?`<div class="em"><div class="ei">👤</div><p>لا يوجد مخولون</p></div>`
    :officers.map(o=>`
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a6ef5,#0ea5e9);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0">${o.name[0]}</div>
          <div style="flex:1"><div style="font-weight:700;font-size:14px">${o.name}</div><div style="font-size:12px;color:#64748b;margin-top:2px">📞 ${o.phone}</div></div>
          <span class="b bb">${districts.find(d=>d.id===o.district)?.name||"—"}</span>
        </div>
        <div style="text-align:left;margin-top:10px"><button class="btd" onclick="delOfficer(${o.id})">🗑 حذف</button></div>
      </div>`).join("");
}

// ══════════════════════════════
// REPORTS
// ══════════════════════════════
async function loadReports(){
  const month=document.getElementById("rp-month").value;
  if(!month) return;
  try{ rpData=await api(`/api/reports/monthly?month=${month}`); renderRp(); }catch(e){ toast(e.message,"err"); }
}
function rpTab(el){ document.querySelectorAll("#rp-tabs .chip").forEach(c=>c.classList.remove("on")); el.classList.add("on"); rpTabVal=el.dataset.t; renderRp(); }
function renderRp(){
  if(!rpData) return;
  const d=rpData,tot=Object.values(d.deviceTotals||{}).reduce((a,v)=>a+v,0);
  if(rpTabVal==="sum"){
    document.getElementById("rp-body").innerHTML=`
      <div class="sg" style="margin-bottom:14px">
        ${[{ic:"🚗",v:d.tours,lb:"جولة منفذة",c:"or"},{ic:"🔧",v:d.maint,lb:"سجل صيانة",c:"gn"},{ic:"📦",v:tot,lb:"جهاز مصروف",c:"bl"},{ic:"⚠️",v:d.pendingMaint,lb:"صيانة معلقة",c:"rd"}]
          .map(s=>`<div class="sc"><div class="si">${s.ic}</div><div class="sv ${s.c}">${s.v}</div><div class="sl">${s.lb}</div></div>`).join("")}
      </div>
      ${d.alertStations?.length?`<div class="card card-red"><div style="font-weight:700;color:#f87171;margin-bottom:8px">⚠️ محطات تحتاج زيارة (${d.alertStations.length})</div>${d.alertStations.slice(0,5).map(s=>`<div style="font-size:12px;color:#94a3b8;padding:3px 0">${s.name}</div>`).join("")}</div>`:""}`;
  } else if(rpTabVal==="dist"){
    document.getElementById("rp-body").innerHTML=(d.distStats||[]).map(ds=>`
      <div class="card">
        <div style="font-weight:700;font-size:14px;margin-bottom:10px">📍 قاطع ${ds.name}</div>
        <div style="display:flex;gap:14px">
          ${[{v:ds.tours,l:"جولة",c:"#fbbf24"},{v:ds.maint,l:"صيانة",c:"#34d399"},{v:ds.devices,l:"جهاز",c:"#60a5fa"}]
            .map(s=>`<div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:900;color:${s.c}">${s.v}</div><div style="font-size:11px;color:#64748b">${s.l}</div></div>`).join("")}
        </div>
      </div>`).join("") || `<div class="em"><div class="ei">📊</div><p>لا توجد بيانات</p></div>`;
  } else {
    const devs=d.deviceTotals||{},mx=Math.max(...Object.values(devs),1);
    document.getElementById("rp-body").innerHTML=`<div class="card">
      <div style="font-size:28px;font-weight:900;color:#fbbf24;margin-bottom:12px">${tot} <span style="font-size:13px;color:#64748b">جهاز مجموع</span></div>
      ${Object.keys(devs).length===0?`<div style="color:#64748b;font-size:13px">لا توجد أجهزة</div>`:
        Object.entries(devs).sort((a,b)=>b[1]-a[1]).map(([t,c])=>`
          <div class="barw">
            <div style="flex:1;font-size:13px">${t}</div>
            <div class="barbg"><div class="barfi" style="width:${Math.round(c/mx*100)}%;background:linear-gradient(90deg,#fbbf24,#d97706)"></div></div>
            <div style="font-size:13px;font-weight:700;color:#fbbf24;width:30px">${c}</div>
          </div>`).join("")}
    </div>`;
  }
}

// ══════════════════════════════
// CRUD
// ══════════════════════════════
async function saveTour(){
  const district=document.getElementById("t-d").value,station=document.getElementById("t-s").value;
  const visitType=document.getElementById("t-v").value,date=document.getElementById("t-dt").value;
  const time=document.getElementById("t-tm").value,notes=document.getElementById("t-no").value;
  if(!district||!station||!date){toast("يرجى ملء الحقول المطلوبة","err");return;}
  try{
    const t=await api("/api/tours","POST",{district,station,visitType,date,time,notes,images:pendImgs.filter(Boolean)});
    tours.unshift(t); pendImgs=[]; document.getElementById("t-imgs").innerHTML="";
    cmo("m-tour"); renderAll(); toast("✅ تم حفظ الجولة");
  }catch(e){toast(e.message,"err");}
}

async function saveMaint(){
  const district=document.getElementById("m-d").value,station=document.getElementById("m-s").value;
  const deviceType=document.getElementById("m-dev").value,qty=document.getElementById("m-qty").value;
  const reason=document.getElementById("m-rsn").value,techName=document.getElementById("m-tch").value;
  const date=document.getElementById("m-dt").value,status=document.getElementById("m-st").value;
  const notes=document.getElementById("m-no").value;
  if(!district||!station||!date){toast("يرجى ملء الحقول المطلوبة","err");return;}
  try{
    const m=await api("/api/maintenance","POST",{district,station,deviceType,qty,reason,techName,date,status,notes});
    maintenance.unshift(m); cmo("m-maint"); renderAll(); toast("✅ تم حفظ السجل");
  }catch(e){toast(e.message,"err");}
}

async function saveOfficer(){
  const district=document.getElementById("o-d").value,name=document.getElementById("o-n").value;
  const phone=document.getElementById("o-p").value,password=document.getElementById("o-w").value;
  if(!district||!name||!phone||!password){toast("يرجى ملء جميع الحقول","err");return;}
  try{
    const o=await api("/api/officers","POST",{district,name,phone,password});
    officers.push(o); cmo("m-officer"); renderOfficers(); toast("✅ تم إضافة المخول");
  }catch(e){toast(e.message,"err");}
}

async function delTour(id){if(!confirm("حذف هذه الجولة؟"))return;await api(`/api/tours/${id}`,"DELETE");tours=tours.filter(t=>t.id!==id);renderAll();toast("🗑 تم الحذف");}
async function delMaint(id){if(!confirm("حذف هذا السجل؟"))return;await api(`/api/maintenance/${id}`,"DELETE");maintenance=maintenance.filter(m=>m.id!==id);renderAll();toast("🗑 تم الحذف");}
async function delOfficer(id){if(!confirm("حذف هذا المخول؟"))return;await api(`/api/officers/${id}`,"DELETE");officers=officers.filter(o=>o.id!==id);renderOfficers();toast("🗑 تم الحذف");}

// ══════════════════════════════
// MODALS
// ══════════════════════════════
function openM(id){
  document.getElementById(id).classList.add("on");
  const now=new Date();
  if(id==="m-tour"){document.getElementById("t-dt").value=now.toISOString().split("T")[0];document.getElementById("t-tm").value=now.toTimeString().slice(0,5);}
  if(id==="m-maint") document.getElementById("m-dt").value=now.toISOString().split("T")[0];
}
function cmo(id){document.getElementById(id).classList.remove("on");}
function cmoOut(e,id){if(e.target.id===id)cmo(id);}

function fillAllSelects(){
  const myD=U.role==="admin"?districts:districts.filter(d=>d.id===U.district);
  ["t-d","m-d","o-d"].forEach(id=>{
    const s=document.getElementById(id); if(!s)return;
    s.innerHTML=`<option value="">— اختر القاطع —</option>`;
    myD.forEach(d=>{const o=document.createElement("option");o.value=d.id;o.textContent=d.name;s.appendChild(o);});
  });
}
function fillSt(dId,sId){
  const did=document.getElementById(dId).value;
  const sel=document.getElementById(sId);
  sel.innerHTML=`<option value="">— اختر المحطة —</option>`;
  (did?stations.filter(s=>s.district===did):stations).forEach(s=>{const o=document.createElement("option");o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
}

function addImgs(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader(); r.onload=ev=>{
      pendImgs.push(ev.target.result);
      const idx=pendImgs.length-1;
      const div=document.createElement("div"); div.className="img-wr";
      div.innerHTML=`<img src="${ev.target.result}" class="img-th"><button class="img-dl" onclick="this.parentNode.remove();pendImgs[${idx}]=null">✕</button>`;
      document.getElementById("t-imgs").appendChild(div);
    }; r.readAsDataURL(f);
  });
}

function showStDet(sid){
  const s=stations.find(x=>x.id===sid);
  const sT=tours.filter(t=>t.station===sid).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sM=maintenance.filter(m=>m.station===sid).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const last=sT[0],d2=last?ds(last.date):999,c=!last?"#f87171":d2>=ALERT?"#fbbf24":"#34d399";
  document.getElementById("m-station-body").innerHTML=`
    <div style="font-size:16px;font-weight:800;margin-bottom:12px">${s.name}</div>
    <div class="rr" style="margin-bottom:14px">
      <span class="b bb">${districts.find(d=>d.id===s.district)?.name}</span>
      <span class="b" style="background:${c}22;color:${c};border:1px solid ${c}44">${!last?"لم تُزار":"آخر زيارة: "+d2+" يوم"}</span>
    </div>
    <div style="font-size:14px;font-weight:700;margin-bottom:8px">📋 الجولات (${sT.length})</div>
    ${sT.length===0?`<div style="font-size:13px;color:#64748b;margin-bottom:12px">لا توجد جولات</div>`:
      sT.slice(0,5).map(t=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(30,58,95,.3)">${vbadge(t.visitType)}<span style="font-size:11px;color:#64748b">${fd(t.date)}</span></div>`).join("")}
    <div style="font-size:14px;font-weight:700;margin:14px 0 8px">🔧 الصيانة (${sM.length})</div>
    ${sM.length===0?`<div style="font-size:13px;color:#64748b">لا توجد صيانة</div>`:
      sM.slice(0,5).map(m=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(30,58,95,.3)"><span style="font-size:13px;color:#94a3b8">${m.deviceType}×${m.qty||1} ${sbadge(m.status)}</span><span style="font-size:11px;color:#64748b">${fd(m.date)}</span></div>`).join("")}`;
  openM("m-station");
}

function showTourDet(id){
  const t=tours.find(x=>x.id===id); if(!t)return;
  document.getElementById("m-tourdet-body").innerHTML=`
    <div style="font-size:16px;font-weight:800;margin-bottom:12px">${t.statName}</div>
    <div class="rr" style="margin-bottom:14px">${vbadge(t.visitType)}<span class="b bb">قاطع ${t.distName}</span><span class="b bx">${fd(t.date)} ${t.time||""}</span></div>
    <div style="font-size:13px;color:#64748b;margin-bottom:12px">👤 ${t.officerName}</div>
    ${t.notes?`<div style="background:#0a0f1e;border-radius:10px;padding:12px;font-size:13px;color:#94a3b8;margin-bottom:14px;line-height:1.6">${t.notes}</div>`:""}
    ${t.images?.length?`<div style="font-size:13px;font-weight:700;margin-bottom:8px">📷 الصور (${t.images.length})</div><div class="img-grid">${t.images.map(i=>`<img src="${i}" style="width:calc(50% - 4px);height:130px;object-fit:cover;border-radius:10px;border:1px solid #1e3a5f">`).join("")}</div>`:""}`;
  openM("m-tourdet");
}

function toast(msg,type="ok"){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.style.background=type==="err"?"#ef4444":type==="warn"?"#f59e0b":"#1a6ef5";
  el.style.display="block";
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display="none",2600);
}

async function logout(){ await fetch("/api/logout",{method:"POST"}); location.href="/"; }

init();
</script>
</body>
